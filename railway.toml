# HealthShield AI — Despliegue en Railway.app
# railway up (instala CLI: npm install -g @railway/cli)
[build]
builder = "NIXPACKS"
buildCommand = "pip install -r backend/requirements.txt && cd backend && python manage.py migrate --noinput && python manage.py collectstatic --noinput"

[deploy]
startCommand = "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
healthcheckPath = "/api/schema/"
restartPolicyType = "ON_FAILURE"
