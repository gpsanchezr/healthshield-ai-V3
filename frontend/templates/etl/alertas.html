{% extends "base.html" %}
{% block title %}Alertas Críticas — HealthShield AI{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="fw-bold mb-0"><i class="bi bi-bell-fill me-2 text-danger"></i>Alertas Críticas</h3>
  <button class="btn btn-warning" onclick="detectarCriticos()"><i class="bi bi-search-heart me-2"></i>Detectar Nuevas</button>
</div>
<div id="alertasContainer"><div class="text-center py-5"><div class="spinner-border text-danger"></div><p class="mt-2 text-muted">Cargando alertas...</p></div></div>
{% endblock %}
{% block scripts %}
<script>
const NIVEL_CONFIG = {
  critica: { color:'danger', icon:'bi-exclamation-octagon-fill' },
  alta:    { color:'warning', icon:'bi-exclamation-triangle-fill' },
  media:   { color:'info',   icon:'bi-info-circle-fill' },
  baja:    { color:'success',icon:'bi-check-circle-fill' },
};

async function loadAlertas(){
  const r = await fetch('/api/etl/alertas/', {headers: authHeaders()});
  const d = await r.json();
  const items = d.results || [];
  const el = document.getElementById('alertasContainer');
  if(!items.length){
    el.innerHTML='<div class="alert alert-success text-center py-5"><i class="bi bi-check-circle-fill fs-1 text-success"></i><h5 class="mt-3">¡Sin alertas activas!</h5><p class="text-muted">Todos los pacientes están dentro de parámetros normales.</p></div>';
    return;
  }
  el.innerHTML = `
    <div class="alert alert-danger d-flex align-items-center mb-3">
      <i class="bi bi-exclamation-triangle-fill me-3 fs-3"></i>
      <div><strong>${items.length} alerta(s) sin atender.</strong> Revisa y confirma cada una.</div>
    </div>
    <div class="row g-3">
      ${items.map(a => {
        const cfg = NIVEL_CONFIG[a.nivel_urgencia] || NIVEL_CONFIG.alta;
        return `
        <div class="col-md-6" id="alerta-${a.id}">
          <div class="card border-${cfg.color} border-2 shadow-sm">
            <div class="card-header bg-${cfg.color} bg-opacity-10 d-flex justify-content-between align-items-center">
              <span class="fw-bold"><i class="bi ${cfg.icon} me-2 text-${cfg.color}"></i>${a.paciente_nombre}</span>
              <span class="badge bg-${cfg.color}">${a.nivel_urgencia.toUpperCase()}</span>
            </div>
            <div class="card-body">
              <p class="mb-2"><strong>${a.descripcion}</strong></p>
              <p class="text-muted small mb-3"><i class="bi bi-clock me-1"></i>${new Date(a.fecha_alerta).toLocaleString('es-CO')}</p>
              <button class="btn btn-${cfg.color} btn-sm w-100" onclick="marcarVista(${a.id})">
                <i class="bi bi-check-lg me-2"></i>Marcar como atendida
              </button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

async function marcarVista(id){
  const r = await fetch(`/api/etl/alertas/${id}/vista/`, {method:'PATCH', headers: authHeaders()});
  if(r.ok){
    document.getElementById(`alerta-${id}`).style.opacity='0.3';
    setTimeout(()=>{ document.getElementById(`alerta-${id}`).remove(); loadAlertas(); }, 600);
  }
}

async function detectarCriticos(){
  const r = await fetch('/api/analytics/detectar/', {method:'POST', headers: authHeaders()});
  const d = await r.json();
  alert(`✅ ${d.alertas_creadas} nuevas alertas generadas`);
  loadAlertas();
}

loadAlertas();
</script>
{% endblock %}
