{% extends "base.html" %}
{% block title %}Auditoría — HealthShield AI{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="fw-bold mb-0"><i class="bi bi-shield-check me-2 text-primary"></i>Log de Auditoría</h3>
  <div class="d-flex gap-2">
    <select id="metodFilter" class="form-select form-select-sm" style="width:120px" onchange="loadLog()">
      <option value="">Todos</option>
      <option value="POST">POST</option>
      <option value="PUT">PUT</option>
      <option value="PATCH">PATCH</option>
      <option value="DELETE">DELETE</option>
    </select>
    <button class="btn btn-outline-primary btn-sm" onclick="loadLog()">
      <i class="bi bi-arrow-clockwise"></i>
    </button>
  </div>
</div>

<div class="row g-3 mb-4" id="auditStats"></div>

<div class="card border-0 shadow-sm">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>Fecha/Hora</th><th>Usuario</th><th>Método</th>
            <th>Endpoint</th><th>IP</th><th>Estado</th>
          </tr>
        </thead>
        <tbody id="auditBody">
          <tr><td colspan="6" class="text-center py-3 text-muted">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadLog() {
  const r = await fetch('/api/auth/auditoria/', {headers: authHeaders()});
  if (r.status === 403) {
    document.getElementById('auditBody').innerHTML =
      '<tr><td colspan="6" class="text-center text-danger py-3">Acceso restringido — Solo Administradores</td></tr>';
    return;
  }
  const d = await r.json();
  const logs = d.results || d.logs || [];

  // Stats
  const metodos = {};
  logs.forEach(l => { metodos[l.metodo] = (metodos[l.metodo]||0)+1; });
  document.getElementById('auditStats').innerHTML = Object.entries(metodos)
    .map(([m,n]) => `
      <div class="col-auto">
        <div class="card border-0 shadow-sm text-center px-4 py-2">
          <span class="badge bg-${m==='DELETE'?'danger':m==='POST'?'primary':m==='PUT'?'warning text-dark':'info'} mb-1">${m}</span>
          <strong>${n}</strong>
        </div>
      </div>`).join('');

  document.getElementById('auditBody').innerHTML = logs.length
    ? logs.map(l => `
      <tr>
        <td><small>${new Date(l.timestamp).toLocaleString('es-CO')}</small></td>
        <td><i class="bi bi-person-circle me-1"></i>${l.usuario}</td>
        <td><span class="badge bg-${l.metodo==='DELETE'?'danger':l.metodo==='POST'?'primary':l.metodo==='PUT'?'warning text-dark':'info'}">${l.metodo}</span></td>
        <td><code class="small">${l.endpoint}</code></td>
        <td><small class="text-muted">${l.ip}</small></td>
        <td><span class="badge ${l.status<300?'bg-success':l.status<400?'bg-warning text-dark':'bg-danger'}">${l.status}</span></td>
      </tr>`).join('')
    : '<tr><td colspan="6" class="text-center py-3 text-muted">Sin registros de auditoría</td></tr>';
}

loadLog();
</script>
{% endblock %}
