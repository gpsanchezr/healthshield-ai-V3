{% extends "base.html" %}
{% block title %}Detalle Paciente — HealthShield AI{% endblock %}
{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb"><li class="breadcrumb-item"><a href="/pacientes/">Pacientes</a></li>
  <li class="breadcrumb-item active">Detalle</li></ol>
</nav>
<div id="detailContent"><div class="text-center py-5"><div class="spinner-border text-primary"></div></div></div>
{% endblock %}
{% block scripts %}
<script>
const pacienteId = window.location.pathname.split('/').filter(Boolean).pop();
const RIESGO_COLOR = {Bajo:'#27ae60',Medio:'#f39c12',Alto:'#e67e22','Crítico':'#e74c3c'};

async function loadDetalle(){
  const r = await fetch(`/api/pacientes/${pacienteId}/`, {headers: authHeaders()});
  if(!r.ok){ document.getElementById('detailContent').innerHTML='<div class="alert alert-danger">Paciente no encontrado</div>'; return; }
  const p = await r.json();
  const reg = p.registros?.[0]||{};
  const color = RIESGO_COLOR[reg.riesgo_enfermedad]||'#6c757d';

  document.getElementById('detailContent').innerHTML = `
    <!-- Título de la vista -->
    <div class="row mb-3">
      <div class="col-12">
        <h3 class="fw-bold text-primary mb-0"><i class="bi bi-person-vcard me-2"></i>Perfil del Paciente</h3>
      </div>
    </div>

    <div class="row g-4">
      <!-- COLUMNA IZQUIERDA: Tarjeta Personal y Predicción -->
      <div class="col-lg-4">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden h-100">
          <div class="bg-primary text-white text-center py-5">
            <div class="display-1 mb-2 opacity-75"><i class="bi bi-person-circle"></i></div>
            <h4 class="fw-bold mb-0">${p.nombres} ${p.apellidos}</h4>
            <p class="mb-0 mt-1 text-white-50"><i class="bi bi-upc-scan me-1"></i>${p.id_paciente_original}</p>
          </div>
          <div class="card-body p-4 bg-white text-center">
            <!-- Grid Info Personal -->
            <div class="d-flex justify-content-around mb-4">
              <div>
                <h4 class="fw-bold mb-0 text-dark">${p.edad}</h4>
                <small class="text-muted">Años</small>
              </div>
              <div class="vr bg-secondary opacity-25"></div>
              <div>
                <h4 class="fw-bold mb-0 text-dark">${p.sexo === 'M' ? '<i class="bi bi-gender-male text-primary"></i>' : '<i class="bi bi-gender-female text-danger"></i>'}</h4>
                <small class="text-muted">${p.sexo === 'M' ? 'Hombre' : 'Mujer'}</small>
              </div>
            </div>
            <hr class="text-muted opacity-25 mb-4">
            
            <h6 class="fw-bold text-secondary mb-3"><i class="bi bi-cpu me-2"></i>Motor de Prevención IA</h6>
            <button class="btn btn-primary rounded-pill w-100 shadow-sm py-2 fw-bold" onclick="predecir()">
              Calcular Riesgo Predictivo
            </button>
            <div id="prediccionResult" class="mt-3 text-start"></div>
          </div>
        </div>
      </div>

      <!-- COLUMNA DERECHA: Hábitos y Datos Clínicos -->
      <div class="col-lg-8">
        <div class="d-flex flex-column gap-4 h-100">
          
          <!-- Fila 1: Diagnóstico -->
          <div class="card border-0 shadow-sm rounded-4 bg-white">
            <div class="card-body p-4">
              <h5 class="fw-bold text-primary mb-3"><i class="bi bi-clipboard2-pulse me-2"></i>Diagnóstico Preliminar</h5>
              <div class="d-flex align-items-center bg-light p-3 rounded-3 border-start border-4 border-primary">
                <div class="flex-grow-1">
                  <h4 class="mb-1 text-dark fw-bold">${reg.diagnostico_preliminar || 'No especificado'}</h4>
                </div>
                <div class="text-end ms-3">
                  <span class="d-block text-muted small mb-1">Riesgo Global</span>
                  <span class="badge rounded-pill shadow-sm px-3 py-2 fs-6" style="background:${color};">${reg.riesgo_enfermedad || '—'}</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Fila 2: Hábitos (Flexbox/Grid) -->
          <div class="card border-0 shadow-sm rounded-4 bg-white">
            <div class="card-body p-4">
              <h5 class="fw-bold text-primary mb-3"><i class="bi bi-heart-pulse me-2"></i>Estilo de Vida y Hábitos</h5>
              <div class="row g-3 text-center">
                <div class="col-md-4">
                  <div class="p-3 rounded-4 ${reg.fumador ? 'bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25' : 'bg-success bg-opacity-10 text-success border border-success border-opacity-25'} h-100 transition-hover">
                    <i class="bi bi-lungs-fill fs-2 mb-2"></i>
                    <h6 class="fw-bold mb-1">Fumador</h6>
                    <span class="fs-5">${reg.fumador ? 'Sí' : 'No'}</span>
                  </div>
                </div>
                <div class="col-md-4">
                  <div class="p-3 rounded-4 ${reg.consumo_alcohol ? 'bg-warning bg-opacity-10 text-warning-emphasis border border-warning border-opacity-25' : 'bg-success bg-opacity-10 text-success border border-success border-opacity-25'} h-100 transition-hover">
                    <i class="bi bi-cup-straw fs-2 mb-2"></i>
                    <h6 class="fw-bold mb-1">Alcohol</h6>
                    <span class="fs-5">${reg.consumo_alcohol ? 'Sí' : 'No'}</span>
                  </div>
                </div>
                <div class="col-md-4">
                  <div class="p-3 rounded-4 bg-info bg-opacity-10 text-info-emphasis border border-info border-opacity-25 h-100 transition-hover">
                    <i class="bi bi-bicycle fs-2 mb-2"></i>
                    <h6 class="fw-bold mb-1">Perfil Fitness</h6>
                    <span class="fs-5">${reg.actividad_fisica || 'Desconocido'}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Fila 3: Análisis de IA Generativa -->
          <div class="card border-0 shadow-sm rounded-4 mt-auto">
            <div class="card-header bg-transparent border-0 pt-4 pb-0 fw-bold d-flex justify-content-between align-items-center">
            <span><i class="bi bi-robot me-2 text-primary"></i>Análisis con IA Generativa</span>
            <div class="d-flex gap-2 align-items-center">
              <select id="iaProvider" class="form-select form-select-sm rounded-pill shadow-sm" style="width:180px">
                <option value="claude">🤖 Claude (Anthropic)</option>
                <option value="gemini">✨ Gemini (Google)</option>
              </select>
              <button class="btn btn-primary btn-sm rounded-pill shadow-sm px-3" onclick="analizarIA()">
                <i class="bi bi-stars me-1"></i>Analizar
              </button>
            </div>
          </div>
            <div class="card-body" id="iaResult">
              <div class="alert alert-secondary bg-light border-0 text-center py-4 mb-0 rounded-4">
                <i class="bi bi-lightbulb fs-2 text-muted mb-2 d-block"></i>
                <span class="text-muted">Selecciona el proveedor de IA y haz clic en "Analizar" para generar un resumen clínico avanzado.</span>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>`;
}

async function predecir(){
  const el = document.getElementById('prediccionResult');
  el.innerHTML='<div class="text-center py-3"><div class="spinner-border text-primary"></div></div>';
  const r = await fetch(`/api/predicciones/paciente/${pacienteId}/`, {method:'POST', headers: authHeaders()});
  const d = await r.json();
  const BADGE = {Bajo:'success',Medio:'warning',Alto:'orange','Crítico':'danger'};
  if(r.ok){
    el.innerHTML=`<div class="alert alert-${BADGE[d.riesgo_predicho]||'secondary'} p-3 text-start border-0 shadow-sm rounded-4 mt-2">
      <div class="d-flex align-items-center mb-2">
        <i class="bi bi-check-circle-fill fs-4 me-2"></i>
        <h5 class="fw-bold mb-0">Riesgo: ${d.riesgo_predicho}</h5>
      </div>
      <div class="progress mb-3" style="height: 6px;">
        <div class="progress-bar bg-${BADGE[d.riesgo_predicho]||'secondary'}" style="width: ${(d.probabilidad_max*100).toFixed(0)}%"></div>
      </div>
      <span class="text-muted d-block mb-2 small">Certeza del ${(d.probabilidad_max*100).toFixed(1)}%</span>
      <hr class="my-2">
      <small><strong>Factores clave:</strong><br>
      ${d.factores_clave.map(f=>`<i class="bi bi-dot"></i> ${f.variable.replace(/_/g,' ')}: <span class="float-end">${(f.importancia*100).toFixed(1)}%</span>`).join('<br>')}
      </small>
    </div>`;
  } else {
    el.innerHTML=`<div class="alert alert-danger p-2 small">${d.error||'Error'}</div>`;
  }
}

loadDetalle();

async function analizarIA() {
  const proveedor = document.getElementById('iaProvider')?.value || 'claude';
  const el = document.getElementById('iaResult');
  el.innerHTML = `<div class="text-center py-3">
    <div class="spinner-border text-primary mb-2"></div>
    <p class="text-muted small">Consultando ${proveedor === 'claude' ? 'Claude (Anthropic)' : 'Gemini (Google)'}...</p>
  </div>`;

  const r = await fetch(\`/api/predicciones/analisis-ia/\${pacienteId}/\`, {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({ proveedor }),
  });
  const d = await r.json();
  const ia = d.analisis_ia || {};

  if (!ia.disponible) {
    el.innerHTML = `<div class="alert alert-warning mb-0">
      <i class="bi bi-exclamation-triangle me-2"></i>
      <strong>${ia.proveedor || proveedor} no disponible.</strong><br>
      <small>${ia.error || 'Configura la API key en el archivo .env'}</small><br>
      <small class="text-muted mt-1 d-block">
        Claude: agrega <code>ANTHROPIC_API_KEY</code> · 
        Gemini: agrega <code>GEMINI_API_KEY</code>
      </small>
    </div>`;
    return;
  }

  const RIESGO_BADGE = {Bajo:'success',Medio:'warning',Alto:'orange','Crítico':'danger'};
  const pred = d.prediccion || {};
  const badge = RIESGO_BADGE[pred.riesgo_predicho] || 'secondary';

  el.innerHTML = `
    <div class="alert alert-${badge} alert-sm py-2 mb-3">
      <strong>Predicción ML: ${pred.riesgo_predicho}</strong> (${((pred.probabilidad_max||0)*100).toFixed(1)}%)
    </div>
    <div class="mb-2">
      <small class="text-muted"><i class="bi bi-robot me-1"></i>
        Análisis generado por <strong>${ia.proveedor}</strong> · 
        Modelo: <code>${ia.modelo || '?'}</code> · 
        ${ia.tokens_salida ? ia.tokens_salida + ' tokens' : ''}
      </small>
    </div>
    <div class="bg-light rounded p-3" style="white-space:pre-wrap;font-size:13.5px;line-height:1.7">${ia.analisis}</div>
    <p class="text-muted small mt-2 mb-0">
      <i class="bi bi-info-circle me-1"></i>
      Este análisis es orientativo y generado por IA. No reemplaza la evaluación médica presencial.
    </p>`;
}

</script>
{% endblock %}
