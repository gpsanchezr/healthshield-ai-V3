version: '3.9'

# HealthShield AI — Orquestación completa con Docker Compose
# Servicios: PostgreSQL + Django + Celery Worker + Redis

services:

  # ── Base de Datos ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: healthshield_db
    environment:
      POSTGRES_DB:       healthshield_db
      POSTGRES_USER:     healthshield
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U healthshield"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Cache y Cola de mensajes ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: healthshield_redis
    ports:
      - "6379:6379"
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  3

  # ── Backend Django ───────────────────────────────────────────────────────────
  backend:
    build:
      context:    .
      dockerfile: docker/Dockerfile
    container_name: healthshield_backend
    command:    ./docker/entrypoint.sh
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgresql://healthshield:${DB_PASSWORD:-securepassword}@db:5432/healthshield_db
      REDIS_URL:    redis://redis:6379/0
      SECRET_KEY:   ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG:        ${DEBUG:-False}
      ML_MODELS_PATH:    /app/ml_models
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY:    ${GEMINI_API_KEY:-}
    volumes:
      - ./backend:/app
      - ./datasets:/app/datasets
      - ml_models:/app/ml_models
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker (ETL + ML asíncrono) ───────────────────────────────────────
  celery_worker:
    build:
      context:    .
      dockerfile: docker/Dockerfile
    container_name: healthshield_celery
    command: bash -c "cd /app && celery -A config worker --loglevel=info --concurrency=2"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgresql://healthshield:${DB_PASSWORD:-securepassword}@db:5432/healthshield_db
      REDIS_URL:    redis://redis:6379/0
      SECRET_KEY:   ${SECRET_KEY:-dev-secret-key-change-in-production}
      ML_MODELS_PATH: /app/ml_models
    volumes:
      - ./backend:/app
      - ./datasets:/app/datasets
      - ml_models:/app/ml_models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  ml_models:
  static_files:
